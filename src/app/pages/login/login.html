<app-login-layout>
    <img 
        src="/logoNaue.png" 
        alt="Naue Consultoria" 
        class="login-logo"
    />
    
    <form [formGroup]="loginForm" (ngSubmit)="submit()">
        <app-login-primary-input
            formControlName="email"
            inputName="email"
            type="email"
            label="Email"
            placeholder="Digite seu email"
        >
        </app-login-primary-input>

        <app-login-primary-input
            formControlName="password"
            inputName="password"
            type="password"
            label="Senha"
            placeholder="Digite sua senha"
        >
        </app-login-primary-input>
        
        <a class="forgot-pwd-link" routerLink="/forgot-password">Esqueceu sua senha?</a>

        <div *ngIf="error" class="error-message">
            <i class="fas fa-exclamation-circle"></i>
            <span>{{ error }}</span>
        </div>

        <button
            type="submit"
            class="btn-primary"
            [disabled]="loading || loginForm.invalid">
            <i [class]="loading ? 'fas fa-spinner fa-spin' : 'fas fa-arrow-right'"></i>
            {{ loading ? 'Entrando...' : 'ENTRAR' }}
        </button>

        <p class="terms-notice">
            Ao entrar, você concorda com os
            <a routerLink="/termos-uso" target="_blank" rel="noopener">Termos de Uso</a>
            e a
            <a routerLink="/politica-privacidade" target="_blank" rel="noopener">Política de Privacidade</a>.
        </p>
    </form>
</app-login-layout>
